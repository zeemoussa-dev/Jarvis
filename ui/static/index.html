<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>J.A.R.V.I.S.</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#051a1f;
    display:flex;align-items:center;justify-content:center;
    height:100vh;overflow:hidden;
    font-family:'Courier New',monospace;
  }
  canvas{position:absolute;top:0;left:0;}
  #bg{z-index:0;}
  #main{z-index:1;}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="main"></canvas>
<script>
// ─── canvas setup ───────────────────────────────────────────────────────────
const bg   = document.getElementById('bg');
const main = document.getElementById('main');
const bgx  = bg.getContext('2d');
const ctx  = main.getContext('2d');

function resize(){
  const s = Math.min(window.innerWidth, window.innerHeight);
  [bg,main].forEach(c=>{c.width=window.innerWidth;c.height=window.innerHeight;});
}
resize();
window.addEventListener('resize', ()=>{resize(); drawBg();});

const CX = ()=> main.width/2;
const CY = ()=> main.height/2;
const R  = ()=> Math.min(main.width,main.height) * 0.38;

// ─── state ──────────────────────────────────────────────────────────────────
let state      = 'idle';
let t          = 0;
let speakPhase = 0;

const STATES = {
  idle:      { label:'STANDBY',    sub:'SYSTEMS NOMINAL'   },
  listening: { label:'LISTENING',  sub:'VOICE DETECTION ACTIVE' },
  thinking:  { label:'PROCESSING', sub:'ANALYZING INPUT'   },
  speaking:  { label:'J.A.R.V.I.S.', sub:'ONLINE'         },
};

function setState(s){ state = s; }

// ─── blueprint background ────────────────────────────────────────────────────
function drawBg(){
  const w=bg.width, h=bg.height;
  bgx.clearRect(0,0,w,h);

  // base gradient
  const grad = bgx.createRadialGradient(w/2,h/2,0,w/2,h/2,w*0.7);
  grad.addColorStop(0,'#0a2a30');
  grad.addColorStop(1,'#020e11');
  bgx.fillStyle=grad;
  bgx.fillRect(0,0,w,h);

  // circuit grid lines
  bgx.strokeStyle='rgba(0,200,220,0.06)';
  bgx.lineWidth=1;
  const step=40;
  for(let x=0;x<w;x+=step){
    bgx.beginPath();bgx.moveTo(x,0);bgx.lineTo(x,h);bgx.stroke();
  }
  for(let y=0;y<h;y+=step){
    bgx.beginPath();bgx.moveTo(0,y);bgx.lineTo(w,y);bgx.stroke();
  }

  // random circuit traces
  bgx.strokeStyle='rgba(0,210,240,0.09)';
  bgx.lineWidth=1;
  const seed=[
    [[50,80],[200,80],[200,160],[350,160]],
    [[w-60,100],[w-200,100],[w-200,200]],
    [[60,h-100],[300,h-100],[300,h-250],[180,h-250]],
    [[w-80,h-80],[w-250,h-80],[w-250,h-200]],
    [[w/2-200,30],[w/2-200,120],[w/2-100,120]],
    [[w/2+200,30],[w/2+200,120],[w/2+100,120]],
  ];
  seed.forEach(pts=>{
    bgx.beginPath();
    pts.forEach(([x,y],i)=>i===0?bgx.moveTo(x,y):bgx.lineTo(x,y));
    bgx.stroke();
    // dot at corners
    pts.forEach(([x,y])=>{
      bgx.beginPath();bgx.arc(x,y,2,0,Math.PI*2);
      bgx.fillStyle='rgba(0,210,240,0.2)';bgx.fill();
    });
  });

  // faint outer schematic text blocks
  bgx.font='7px Courier New';
  bgx.fillStyle='rgba(0,210,240,0.12)';
  const labels=['AI-7734','SYS-CORE','NET-LINK','PWR-OPT','MEM-BUS','IO-CTRL'];
  labels.forEach((l,i)=>{
    bgx.fillText(l, 20 + (i%2)*( w-80), 20 + Math.floor(i/2)*30);
  });
}
drawBg();

// ─── helpers ─────────────────────────────────────────────────────────────────
function arc(cx,cy,r,start,end,cw=false){
  ctx.beginPath(); ctx.arc(cx,cy,r,start,end,cw);
}
function glowColor(a){ return `rgba(0,210,240,${a})`; }
function goldColor(a) { return `rgba(255,200,40,${a})`; }

function setGlow(color,blur){
  ctx.shadowColor=color; ctx.shadowBlur=blur;
}
function clearGlow(){ ctx.shadowBlur=0; }

// ─── draw tick ring ───────────────────────────────────────────────────────────
function drawTicks(cx,cy,r,count,lenShort,lenLong,every,alpha,lineW){
  for(let i=0;i<count;i++){
    const angle=(i/count)*Math.PI*2 - Math.PI/2;
    const isMaj = i%every===0;
    const inner = r - (isMaj?lenLong:lenShort);
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(angle)*inner, cy+Math.sin(angle)*inner);
    ctx.lineTo(cx+Math.cos(angle)*r,     cy+Math.sin(angle)*r);
    ctx.strokeStyle=glowColor(isMaj?alpha:alpha*0.45);
    ctx.lineWidth=isMaj?lineW*1.6:lineW;
    ctx.stroke();
  }
}

// ─── main draw loop ───────────────────────────────────────────────────────────
function draw(){
  const w=main.width, h=main.height;
  const cx=w/2, cy=h/2, r=R();
  ctx.clearRect(0,0,w,h);

  const idle     = state==='idle';
  const listening= state==='listening';
  const thinking = state==='thinking';
  const speaking = state==='speaking';

  // brightness modifier
  const breath   = 0.55 + 0.45*Math.sin(t*1.2);
  const fastPulse= 0.55 + 0.45*Math.sin(t*5);
  const brightMod= idle? breath : (thinking? 0.75+0.25*Math.sin(t*3) : 1.0);

  // ── LAYER 1: outermost thin ring with ticks ──────────────────────────────
  const r1 = r * 1.18;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(t * (idle?0.04 : listening?0.12 : thinking?-0.08 : 0.06));
  ctx.translate(-cx,-cy);
  setGlow('#00d4ff', 6*brightMod);
  ctx.strokeStyle=glowColor(0.3*brightMod);
  ctx.lineWidth=1;
  arc(cx,cy,r1,0,Math.PI*2);
  ctx.stroke();
  drawTicks(cx,cy,r1,120,4,10,10,0.5*brightMod,0.8);
  clearGlow();
  ctx.restore();

  // ── LAYER 2: second tick ring ────────────────────────────────────────────
  const r2 = r * 1.08;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(-t*(idle?0.02:0.08));
  ctx.translate(-cx,-cy);
  setGlow('#00d4ff',8*brightMod);
  ctx.strokeStyle=glowColor(0.4*brightMod);
  ctx.lineWidth=1.5;
  arc(cx,cy,r2,0,Math.PI*2);
  ctx.stroke();
  drawTicks(cx,cy,r2,60,3,8,5,0.45*brightMod,0.8);
  clearGlow();
  ctx.restore();

  // ── LAYER 3: thick glowing cyan ring (the main hero ring) ────────────────
  const r3 = r * 0.97;
  setGlow('#00d4ff', 28*brightMod);
  ctx.strokeStyle=glowColor(0.85*brightMod);
  ctx.lineWidth=r*0.07;
  arc(cx,cy,r3,0,Math.PI*2);
  ctx.stroke();
  // inner bright edge
  ctx.strokeStyle=glowColor(0.55*brightMod);
  ctx.lineWidth=r*0.015;
  arc(cx,cy,r3-r*0.04,0,Math.PI*2);
  ctx.stroke();
  clearGlow();

  // ── LAYER 4: yellow gold arc (progress / activity indicator) ─────────────
  const r4 = r * 0.85;
  const goldStart = -Math.PI/2;
  let goldSweep;
  if(idle)      goldSweep = Math.PI * 0.35;
  else if(listening) goldSweep = Math.PI * (0.6 + 0.4*Math.sin(t*2));
  else if(thinking)  goldSweep = Math.PI * 2 * ((t*0.3)%1);
  else               goldSweep = Math.PI * (1.4 + 0.6*Math.sin(t*3));

  setGlow('#ffcc00', 18);
  ctx.strokeStyle=goldColor(0.9);
  ctx.lineWidth=r*0.025;
  arc(cx,cy,r4, goldStart, goldStart+goldSweep);
  ctx.stroke();
  clearGlow();

  // ── LAYER 5: yellow dots ─────────────────────────────────────────────────
  const dotCount = 6;
  const dotR = r * 0.84;
  for(let i=0;i<dotCount;i++){
    const angle = goldStart + (i/(dotCount-1))*goldSweep;
    const dx = cx + Math.cos(angle)*dotR;
    const dy = cy + Math.sin(angle)*dotR;
    setGlow('#ffcc00',12);
    ctx.beginPath();ctx.arc(dx,dy,r*0.018,0,Math.PI*2);
    ctx.fillStyle=goldColor(i<dotCount-1? 1.0 : 0.35);
    ctx.fill();
    clearGlow();
  }

  // ── LAYER 6: inner rings ─────────────────────────────────────────────────
  const innerRings=[
    {r:r*0.75, w:r*0.008, a:0.5, speed: 0.05},
    {r:r*0.68, w:r*0.004, a:0.35,speed:-0.08},
    {r:r*0.60, w:r*0.006, a:0.45, speed:0.03},
  ];
  innerRings.forEach(({r:ir,w,a,speed})=>{
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(t*speed*(idle?1:2));
    ctx.translate(-cx,-cy);
    setGlow('#00d4ff',10*brightMod);
    ctx.strokeStyle=glowColor(a*brightMod);
    ctx.lineWidth=w;
    arc(cx,cy,ir,0,Math.PI*2);
    ctx.stroke();
    clearGlow();
    ctx.restore();
  });

  // ── LAYER 7: inner tick marks on r*0.75 ring ─────────────────────────────
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(t*0.05*(idle?1:2));
  ctx.translate(-cx,-cy);
  drawTicks(cx,cy,r*0.755,48,3,7,6,0.4*brightMod,0.7);
  ctx.restore();

  // ── SPEAKING: expanding ripples + waveform ───────────────────────────────
  if(speaking){
    speakPhase += 0.05;
    for(let i=0;i<4;i++){
      const p  = (speakPhase + i*0.7) % 1;
      const rp = r3 + p*r*0.35;
      const a  = (1-p)*0.4;
      ctx.beginPath(); ctx.arc(cx,cy,rp,0,Math.PI*2);
      ctx.strokeStyle=glowColor(a);
      ctx.lineWidth=1.5;
      ctx.stroke();
    }
    // waveform bars at ring edge
    const bars=48;
    for(let i=0;i<bars;i++){
      const angle=(i/bars)*Math.PI*2;
      const amp = Math.abs(Math.sin(speakPhase*9 + i*0.4))*r*0.12 + r*0.02;
      const x1=cx+Math.cos(angle)*(r3+r*0.05);
      const y1=cy+Math.sin(angle)*(r3+r*0.05);
      const x2=cx+Math.cos(angle)*(r3+r*0.05+amp);
      const y2=cy+Math.sin(angle)*(r3+r*0.05+amp);
      setGlow('#00d4ff',6);
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
      ctx.strokeStyle=glowColor(0.7);
      ctx.lineWidth=1.5;
      ctx.stroke();
      clearGlow();
    }
  }

  // ── LISTENING: rotating bright arc ──────────────────────────────────────
  if(listening){
    const scanAngle = t*2.2;
    setGlow('#00ffff',20);
    ctx.strokeStyle='rgba(0,255,255,0.9)';
    ctx.lineWidth=r*0.018;
    arc(cx,cy,r3, scanAngle, scanAngle+Math.PI*0.55);
    ctx.stroke();
    clearGlow();
  }

  // ── THINKING: rotating dashed ring overlay ───────────────────────────────
  if(thinking){
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(t*1.4);
    ctx.translate(-cx,-cy);
    ctx.setLineDash([r*0.05, r*0.04]);
    ctx.strokeStyle=glowColor(0.55);
    ctx.lineWidth=r*0.012;
    arc(cx,cy,r*1.02,0,Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // ── center dark circle ────────────────────────────────────────────────────
  const centerR = r*0.52;
  const cg = ctx.createRadialGradient(cx,cy,0,cx,cy,centerR);
  cg.addColorStop(0,'rgba(0,20,25,0.98)');
  cg.addColorStop(0.7,'rgba(0,30,35,0.95)');
  cg.addColorStop(1,'rgba(0,40,50,0.6)');
  ctx.fillStyle=cg;
  ctx.beginPath();ctx.arc(cx,cy,centerR,0,Math.PI*2);ctx.fill();

  // subtle center glow ring
  setGlow('#00d4ff',16*brightMod);
  ctx.strokeStyle=glowColor(0.2*brightMod);
  ctx.lineWidth=1;
  arc(cx,cy,centerR,0,Math.PI*2);
  ctx.stroke();
  clearGlow();

  // ── center text ──────────────────────────────────────────────────────────
  const meta = STATES[state]||STATES.idle;
  const titleSize = Math.max(14, r*0.115);
  const subSize   = Math.max(9,  r*0.055);

  // main title
  setGlow('#ffffff', 18*brightMod);
  ctx.fillStyle=`rgba(255,255,255,${0.92*brightMod})`;
  ctx.font=`bold ${titleSize}px 'Courier New'`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(meta.label, cx, cy - subSize*0.8);
  clearGlow();

  // subtitle / status
  const subAlpha = 0.65 * (listening||thinking ? fastPulse : brightMod);
  setGlow('#00d4ff', 10);
  ctx.fillStyle=`rgba(0,210,240,${subAlpha})`;
  ctx.font=`${subSize}px 'Courier New'`;
  ctx.fillText(meta.sub, cx, cy + titleSize*0.65);
  clearGlow();

  t += 1/60;
  requestAnimationFrame(draw);
}

draw();

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connect(){
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = e => {
    try{ const d=JSON.parse(e.data); if(d.state) setState(d.state); }catch(_){}
  };
  ws.onclose = ()=> setTimeout(connect, 2000);
}
connect();

// ─── dev keyboard shortcuts (cycle states for testing) ──────────────────────
const cycle=['idle','listening','thinking','speaking'];
let ci=0;
document.addEventListener('keydown', e=>{
  if(e.key===' '){ ci=(ci+1)%cycle.length; setState(cycle[ci]); }
});
</script>
</body>
</html>
